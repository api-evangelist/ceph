openapi: 3.1.0
info:
  title: Ceph Manager REST API
  description: |
    REST API exposed by the Ceph Manager (ceph-mgr) dashboard module for
    managing and monitoring a Ceph cluster, including pools, OSDs, hosts,
    monitors, RGW, RBD, CephFS, users, and cluster configuration. Authentication
    uses a JWT obtained from POST /api/auth, supplied via the Authorization
    Bearer header. API versioning is negotiated via the Accept header using
    application/vnd.ceph.api.v{major}.{minor}+json. Generated as a best-effort
    spec from public Ceph documentation; the canonical OpenAPI is served by
    every Ceph Manager instance at /docs/api.json.
  version: "1.0"
  contact:
    name: Ceph
    url: https://docs.ceph.com/en/latest/mgr/ceph_api/
  license:
    name: LGPL-2.1
    url: https://github.com/ceph/ceph/blob/main/COPYING
servers:
  - url: https://{manager_host}:{dashboard_port}/api
    description: Ceph Manager dashboard
    variables:
      manager_host:
        default: localhost
      dashboard_port:
        default: "8443"
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Cluster
  - name: User
  - name: Configuration
  - name: Daemon
  - name: CRUSH
paths:
  /auth:
    post:
      tags: [Auth]
      summary: Obtain JWT token
      description: Authenticate with username and password to obtain a JWT for subsequent calls.
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '201':
          description: Authentication successful.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          $ref: '#/components/responses/Error'
  /auth/check:
    post:
      tags: [Auth]
      summary: Validate token
      description: Validate the current bearer token.
      operationId: checkAuth
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
      responses:
        '200':
          description: Token validity status.
          content:
            application/json:
              schema:
                type: object
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Revoke the current authentication session.
      operationId: logout
      responses:
        '200':
          description: Logged out.
  /cluster:
    get:
      tags: [Cluster]
      summary: Get cluster status
      description: Retrieve cluster health and status information.
      operationId: getCluster
      responses:
        '200':
          description: Cluster status.
          content:
            application/json:
              schema:
                type: object
    put:
      tags: [Cluster]
      summary: Update cluster state
      description: Modify cluster operational state.
      operationId: updateCluster
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Cluster updated.
  /cluster/user:
    get:
      tags: [User]
      summary: List Ceph users
      description: List Ceph users and associated capability data.
      operationId: listUsers
      responses:
        '200':
          description: User list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CephUser'
    post:
      tags: [User]
      summary: Create Ceph user
      description: Create a new Ceph user with permissions/capabilities.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CephUser'
      responses:
        '201':
          description: User created.
    put:
      tags: [User]
      summary: Update Ceph user
      description: Modify existing user capabilities.
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CephUser'
      responses:
        '200':
          description: User updated.
  /cluster/user/{user_entities}:
    delete:
      tags: [User]
      summary: Delete Ceph user(s)
      description: Remove one or more Ceph user accounts.
      operationId: deleteUser
      parameters:
        - in: path
          name: user_entities
          required: true
          schema: { type: string }
          description: Comma-separated list of user entity identifiers (e.g., client.admin).
      responses:
        '204':
          description: User deleted.
  /cluster_conf:
    get:
      tags: [Configuration]
      summary: List cluster configuration
      description: Retrieve all cluster configuration settings.
      operationId: listClusterConf
      responses:
        '200':
          description: Configuration items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClusterConfig'
    post:
      tags: [Configuration]
      summary: Create or update configuration option
      operationId: setClusterConf
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterConfig'
      responses:
        '201':
          description: Configuration option set.
  /cluster_conf/filter:
    get:
      tags: [Configuration]
      summary: Filter cluster configuration
      description: Query specific configuration by option names.
      operationId: filterClusterConf
      parameters:
        - in: query
          name: names
          required: true
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
      responses:
        '200':
          description: Matching configuration items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClusterConfig'
  /cluster_conf/{name}:
    delete:
      tags: [Configuration]
      summary: Delete configuration option
      operationId: deleteClusterConf
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Configuration option removed.
  /daemon:
    get:
      tags: [Daemon]
      summary: List daemons
      description: List cluster daemons with optional type filtering.
      operationId: listDaemons
      parameters:
        - in: query
          name: daemon_type
          schema: { type: string }
      responses:
        '200':
          description: Daemon list.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
  /daemon/{daemon_name}:
    put:
      tags: [Daemon]
      summary: Daemon action
      description: Execute a daemon action such as restart or upgrade.
      operationId: daemonAction
      parameters:
        - in: path
          name: daemon_name
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum: [start, stop, restart, redeploy]
      responses:
        '200':
          description: Action executed.
  /crush_rule:
    get:
      tags: [CRUSH]
      summary: List CRUSH rules
      description: List CRUSH rule configuration for data placement.
      operationId: listCrushRules
      responses:
        '200':
          description: CRUSH rules.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
    post:
      tags: [CRUSH]
      summary: Create CRUSH rule
      operationId: createCrushRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: CRUSH rule created.
  /crush_rule/{name}:
    delete:
      tags: [CRUSH]
      summary: Delete CRUSH rule
      operationId: deleteCrushRule
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      responses:
        '204':
          description: CRUSH rule removed.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT obtained from POST /api/auth.
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            type: object
            properties:
              detail: { type: string }
              code: { type: string }
  schemas:
    AuthRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string }
    AuthResponse:
      type: object
      properties:
        token: { type: string }
        username: { type: string }
        permissions:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        pwdExpirationDate:
          type: integer
          nullable: true
        sso: { type: boolean }
        pwdUpdateRequired: { type: boolean }
    CephUser:
      type: object
      properties:
        user_entity: { type: string }
        capabilities:
          type: object
          additionalProperties: { type: string }
        import_data: { type: string }
    ClusterConfig:
      type: object
      properties:
        name: { type: string }
        value: { type: string }
        section: { type: string }
        source: { type: string }
        type: { type: string }
        level: { type: string }
        desc: { type: string }
